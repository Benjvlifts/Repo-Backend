name: Backend CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ms-auth, ms-proyectos, ms-recursos, ms-analitica, ms-notif]

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Run Unit Tests for ${{ matrix.service }}
      run: |
        cd ${{ matrix.service }}
        chmod +x mvnw
        ./mvnw test