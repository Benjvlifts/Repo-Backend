name: Backend CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [ms-auth, ms-proyectos, ms-recursos, ms-analitica, ms-notif]

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # 'verify' corre los tests y además dispara jacoco:report (fase test/verify
    # según el pom de cada microservicio), generando target/site/jacoco/jacoco.xml
    - name: Run Unit Tests + JaCoCo Coverage for ${{ matrix.service }}
      run: |
        cd ${{ matrix.service }}
        chmod +x mvnw
        ./mvnw verify

    - name: Upload JaCoCo report for ${{ matrix.service }}
      uses: actions/upload-artifact@v4
      with:
        name: jacoco-report-${{ matrix.service }}
        path: ${{ matrix.service }}/target/site/jacoco/
        retention-days: 7

  sonarcloud:
    # Job independiente: analiza cada microservicio en SonarCloud y publica
    # las métricas y gráficos (cobertura, bugs, code smells, duplicación, etc.).
    # Requiere el secret SONAR_TOKEN configurado en GitHub
    # (Settings > Secrets and variables > Actions > New repository secret).
    # Si el secret no existe, este job se omite automáticamente.
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
    strategy:
      matrix:
        service: [ms-auth, ms-proyectos, ms-recursos, ms-analitica, ms-notif]

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0   # SonarCloud necesita el historial completo para el blame de líneas

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Verify + analyze ${{ matrix.service }} with SonarCloud
      if: ${{ env.SONAR_TOKEN != '' }}
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        cd ${{ matrix.service }}
        chmod +x mvnw
        ./mvnw verify sonar:sonar -Dsonar.token=$SONAR_TOKEN