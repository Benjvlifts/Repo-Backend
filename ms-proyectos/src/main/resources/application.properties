spring.application.name=ms-proyectos
server.port=8082

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:proyectos_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

server.error.include-message=always

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_SERVER:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# FIX Bug 1: secreto compartido con ms-auth para verificar firma HMAC
app.jwt.secret=${JWT_SECRET}

# FIX Bug 7: URL base configurable para repositorios SOFTWARE
app.repository.base-url=${REPO_BASE_URL:https://github.com/innovatech/}

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs