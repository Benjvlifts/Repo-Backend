_format_version: "3.0"
_transform: true

services:
  - name: ms-auth-service
    url: http://host.docker.internal:8081
    connect_timeout: 5000
    read_timeout: 8000

  - name: ms-proyectos-service
    url: http://host.docker.internal:8082
    connect_timeout: 5000
    read_timeout: 8000

  - name: ms-recursos-service
    url: http://host.docker.internal:8083
    connect_timeout: 5000
    read_timeout: 8000

  - name: ms-analitica-service
    url: http://host.docker.internal:8084
    connect_timeout: 5000
    read_timeout: 10000

  - name: ms-notif-service
    url: http://host.docker.internal:8085
    connect_timeout: 5000
    read_timeout: 8000

routes:
  - name: auth-login
    service: ms-auth-service
    paths: ["/api/auth/login"]
    methods: ["POST"]
    strip_path: false

  - name: auth-register
    service: ms-auth-service
    paths: ["/api/auth/register"]
    methods: ["POST"]
    strip_path: false

  - name: auth-protected
    service: ms-auth-service
    paths: ["/api/auth"]
    methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
    strip_path: false

  - name: proyectos-all
    service: ms-proyectos-service
    paths: ["/api/projects"]
    methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
    strip_path: false

  - name: recursos-all
    service: ms-recursos-service
    paths: ["/api/resources"]
    methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
    strip_path: false

  - name: analitica-all
    service: ms-analitica-service
    paths: ["/api/v1/analitica"]
    methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
    strip_path: false

  - name: notif-all
    service: ms-notif-service
    paths: ["/api/v1/notificaciones"]
    methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
    strip_path: false

plugins:
  - name: rate-limiting
    config:
      minute: 100
      policy: local
      error_message: "Demasiadas solicitudes. Intente más tarde."

  - name: rate-limiting
    route: auth-login
    config:
      minute: 10
      policy: local
      error_message: "Demasiados intentos de login. Espera 1 minuto."

  - name: jwt
    route: auth-protected
    config:
      secret_is_base64: false
      claims_to_verify: ["exp"]

  - name: jwt
    route: proyectos-all
    config:
      secret_is_base64: false
      claims_to_verify: ["exp"]

  - name: jwt
    route: recursos-all
    config:
      secret_is_base64: false
      claims_to_verify: ["exp"]

  - name: jwt
    route: analitica-all
    config:
      secret_is_base64: false
      claims_to_verify: ["exp"]

  - name: jwt
    route: notif-all
    config:
      secret_is_base64: false
      claims_to_verify: ["exp"]

  - name: cors
    config:
      origins: ["http://localhost:5173", "http://localhost:3000", "http://localhost:5174"]
      methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
      headers: ["Authorization", "Content-Type", "Accept"]
      exposed_headers: ["Authorization"]
      credentials: true
      max_age: 3600

consumers:
  - username: innovatech-app
    jwt_secrets:
      - secret: "5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437"
        algorithm: HS256