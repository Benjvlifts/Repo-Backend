_format_version: "3.0"
_transform: true

# ═══════════════════════════════════════════════════════════════
#  KONG GATEWAY — Innovatech Solutions
#  Modo: DB-less (declarativo)
#  Puerto proxy: 8000
#  JWT Secret = mismo que ms-auth (app.jwt.secret)
# ═══════════════════════════════════════════════════════════════

# ── SERVICIOS (backends reales) ──────────────────────────────────
services:

  # ms-auth (puerto 8081)
  - name: ms-auth-service
    url: http://host.docker.internal:8081
    connect_timeout: 5000
    read_timeout: 8000

  # ms-proyectos (puerto 8082)
  - name: ms-proyectos-service
    url: http://host.docker.internal:8082
    connect_timeout: 5000
    read_timeout: 8000

  # ms-recursos (puerto 8083)
  - name: ms-recursos-service
    url: http://host.docker.internal:8083
    connect_timeout: 5000
    read_timeout: 8000

# ── RUTAS ────────────────────────────────────────────────────────
routes:

  # AUTH — Rutas públicas (sin JWT)
  - name: auth-login
    service: ms-auth-service
    paths: ["/api/auth/login"]
    methods: ["POST"]
    strip_path: false

  - name: auth-register
    service: ms-auth-service
    paths: ["/api/auth/register"]
    methods: ["POST"]
    strip_path: false

  # AUTH — Rutas protegidas (con JWT)
  - name: auth-protected
    service: ms-auth-service
    paths: ["/api/auth"]
    methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
    strip_path: false

  # PROYECTOS — Rutas protegidas
  - name: proyectos-all
    service: ms-proyectos-service
    paths: ["/api/projects"]
    methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
    strip_path: false

  # RECURSOS — Rutas protegidas
  - name: recursos-all
    service: ms-recursos-service
    paths: ["/api/resources"]
    methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
    strip_path: false

# ── PLUGINS GLOBALES ─────────────────────────────────────────────
plugins:

  # Rate Limiting global (100 req/min por IP)
  - name: rate-limiting
    config:
      minute: 100
      policy: local
      error_message: "Demasiadas solicitudes. Intente más tarde."

  # Rate Limiting estricto solo para login (10 req/min por IP)
  - name: rate-limiting
    route: auth-login
    config:
      minute: 10
      policy: local
      error_message: "Demasiados intentos de login. Espera 1 minuto."

  # JWT en rutas protegidas de auth
  - name: jwt
    route: auth-protected
    config:
      secret_is_base64: false
      claims_to_verify: ["exp"]

  # JWT en proyectos
  - name: jwt
    route: proyectos-all
    config:
      secret_is_base64: false
      claims_to_verify: ["exp"]

  # JWT en recursos
  - name: jwt
    route: recursos-all
    config:
      secret_is_base64: false
      claims_to_verify: ["exp"]

  # CORS global
  - name: cors
    config:
      origins: ["http://localhost:5173", "http://localhost:3000"]
      methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
      headers: ["Authorization", "Content-Type", "Accept"]
      exposed_headers: ["Authorization"]
      credentials: true
      max_age: 3600

  # Request logging
  - name: request-termination
    route: auth-login
    enabled: false  # Solo para debug, deshabilitado en producción

# ── CONSUMIDOR JWT (para validación) ─────────────────────────────
consumers:
  - username: innovatech-app
    jwt_secrets:
      - secret: "5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437"
        algorithm: HS256